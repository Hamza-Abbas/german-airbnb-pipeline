version: 2

models:
  - name: stg_listings
    description: "Cleaned and unioned Airbnb listings for Berlin and Munich"
    columns:
      - name: listing_id
        description: "Unique identifier for each listing"
        tests:
          - unique
          - not_null
      - name: city
        description: "City of the listing — Berlin or Munich"
        tests:
          - not_null
          - accepted_values:
              values: ['Berlin', 'Munich']
      - name: price_per_night
        description: "Nightly price in EUR, cleaned from raw string format"
        tests:
          - not_null
      - name: room_type
        description: "Type of room listed"
        tests:
          - accepted_values:
              values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']

  - name: stg_reviews
    description: "Cleaned and unioned reviews for Berlin and Munich"
    columns:
      - name: review_id
        description: "Unique identifier for each review"
        tests:
          - unique
          - not_null
      - name: listing_id
        description: "Foreign key to stg_listings"
        tests:
          - not_null
      - name: review_date
        description: "Date the review was posted"
        tests:
          - not_null

  - name: stg_calendar
    description: "Cleaned availability calendar for Berlin and Munich"
    columns:
      - name: listing_id
        description: "Foreign key to stg_listings"
        tests:
          - not_null
      - name: calendar_date
        description: "Date of the calendar entry"
        tests:
          - not_null
      - name: is_available
        description: "Whether the listing is available on this date"
        tests:
          - not_null

  - name: int_listings_enriched
    description: "Listings enriched with host type, price segment and availability category"
    columns:
      - name: listing_id
        description: "Unique identifier for each listing"
        tests:
          - unique
          - not_null
      - name: host_type
        description: "Host segmentation based on number of listings"
        tests:
          - accepted_values:
              values: ['Casual', 'Semi-Professional', 'Professional']
      - name: price_segment
        description: "Price tier based on nightly rate"
        tests:
          - accepted_values:
              values: ['Budget', 'Mid-Range', 'Premium', 'Luxury']